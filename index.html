<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Simulator Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body onload="loadCountries()">
<header>
  <h1>🌍 Life Simulator</h1>
</header>
<main>
  <!-- <div class="search-container">
    <input type="text", id="searchInput", placeholder="Search country...", onchange="searchCountry()">
  </div> -->
  <div class="container">
    <input type="text", id="search", placeholder="Search country...", onchange="searchCountry()">
    <select id="filter" onchange="filterRegion()">
      <option value="all">All</option>
      <option value="Asia">Asia</option>
      <option value="Europe">Europe</option>
      <option value="Africa">Africa</option>
      <option value="Americas">Americas</option>
      <option value="Oceania">Oceania</option>
    </select>
    <!-- change later, not working with filter -->
    <!-- <select id="sort" onchange="sortNames()">
      <option value="none">Sort</option>
      <option value="az">A-Z</option>
      <option value="za">Z-A</option>
    </select> -->
    <button onclick="random()">Surprise Me</button>
  </div>
  <section>
    <h2>Select a Country</h2>
    <div id="countryList" class="country-grid"></div>
  </section>
  <div id="loading" class="hidden">Loading...</div>
</main>
<script src="script.js"></script>
</body>
</html>
